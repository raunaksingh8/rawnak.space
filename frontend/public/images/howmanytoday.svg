<svg viewBox="0 0 1200 525" xmlns="http://www.w3.org/2000/svg" width="1200" height="525">
  <defs>
    <linearGradient id="hmtBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="525" fill="url(#hmtBg)"/>

  <!-- Indian flag bars (left accent) -->
  <rect x="50" y="100" width="8" height="100" rx="4" fill="#FF9933"/>
  <rect x="50" y="212" width="8" height="100" rx="4" fill="#CBD5E1"/>
  <rect x="50" y="324" width="8" height="100" rx="4" fill="#138808"/>

  <!-- Title -->
  <text x="100" y="190" font-family="Segoe UI, sans-serif" font-size="68" font-weight="800" fill="#1a1a1a">How Many</text>
  <text x="100" y="265" font-family="Segoe UI, sans-serif" font-size="68" font-weight="800" fill="#1a1a1a">Today?</text>

  <!-- Subtitle -->
  <text x="102" y="310" font-family="Segoe UI, sans-serif" font-size="22" fill="#888888">india's daily numbers — wild, wonderful, unhinged</text>

  <!-- Giant hollow outline number -->
  <text x="720" y="290" font-family="Segoe UI, sans-serif" font-size="180" font-weight="900" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2" text-anchor="middle">1.4B</text>

  <!-- Solid number on top -->
  <text x="720" y="260" font-family="Segoe UI, sans-serif" font-size="72" font-weight="900" fill="#D95B0B" text-anchor="middle">1,42,86,263</text>

  <!-- Stat cards row -->
  <g transform="translate(570, 320)">
    <!-- Tea card -->
    <rect x="0" y="0" width="85" height="100" rx="12" fill="rgba(255,153,51,0.08)" stroke="rgba(255,153,51,0.3)" stroke-width="1"/>
    <text x="42" y="42" font-size="28" text-anchor="middle">☕</text>
    <text x="42" y="70" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#D95B0B" text-anchor="middle">1.2B</text>
    <text x="42" y="88" font-family="Segoe UI, sans-serif" font-size="10" fill="#999" text-anchor="middle">CHAI</text>

    <!-- Water card -->
    <rect x="100" y="0" width="85" height="100" rx="12" fill="rgba(14,77,100,0.06)" stroke="rgba(14,77,100,0.3)" stroke-width="1"/>
    <text x="142" y="42" font-size="28" text-anchor="middle">💧</text>
    <text x="142" y="70" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0B7A9D" text-anchor="middle">42T</text>
    <text x="142" y="88" font-family="Segoe UI, sans-serif" font-size="10" fill="#999" text-anchor="middle">LITRES</text>

    <!-- Internet card -->
    <rect x="200" y="0" width="85" height="100" rx="12" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="242" y="42" font-size="28" text-anchor="middle">📱</text>
    <text x="242" y="70" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#4F46E5" text-anchor="middle">18B</text>
    <text x="242" y="88" font-family="Segoe UI, sans-serif" font-size="10" fill="#999" text-anchor="middle">GB</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="130" cy="430" r="3" fill="#FF9933" opacity="0.2"/>
  <circle cx="200" cy="450" r="2" fill="#138808" opacity="0.25"/>
  <circle cx="350" cy="440" r="4" fill="#FF9933" opacity="0.15"/>
  <circle cx="450" cy="460" r="2.5" fill="#138808" opacity="0.2"/>
  <circle cx="520" cy="435" r="3" fill="#D95B0B" opacity="0.12"/>

  <!-- Subtle glow accents -->
  <circle cx="900" cy="80" r="200" fill="#FF9933" opacity="0.05"/>
  <circle cx="1100" cy="450" r="150" fill="#138808" opacity="0.05"/>
</svg>
