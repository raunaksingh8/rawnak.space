<svg viewBox="0 0 1200 525" xmlns="http://www.w3.org/2000/svg" width="1200" height="525">
  <!-- Stripes background -->
  <rect width="1200" height="525" fill="#a50044"/>
  <rect x="0" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="160" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="320" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="480" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="640" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="800" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="960" y="0" width="80" height="525" fill="#004d98"/>
  <rect x="1120" y="0" width="80" height="525" fill="#004d98"/>

  <!-- Dark overlay left for text -->
  <rect x="0" y="0" width="480" height="525" fill="rgba(0,0,0,0.45)"/>

  <!-- Title -->
  <text x="50" y="130" font-family="Segoe UI, sans-serif" font-size="64" font-weight="700" fill="#ffffff">FC Barcelona</text>
  <text x="52" y="180" font-family="Segoe UI, sans-serif" font-size="28" fill="#cccccc">UCL Timer</text>
  <text x="52" y="230" font-family="Segoe UI, sans-serif" font-size="22" fill="#aaaaaa">since the last Champions League win</text>

  <!-- Year badge -->
  <rect x="50" y="270" width="120" height="44" rx="8" fill="#f5c842"/>
  <text x="110" y="300" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#1a1a1a" text-anchor="middle">2015</text>

  <!-- Football pitch -->
  <rect x="560" y="80" width="580" height="370" rx="12" fill="#2d7a3a"/>

  <!-- Pitch lines -->
  <rect x="560" y="80" width="580" height="370" rx="12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Center line -->
  <line x1="850" y1="80" x2="850" y2="450" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Center circle -->
  <circle cx="850" cy="265" r="65" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="850" cy="265" r="4" fill="white"/>
  <!-- Left penalty box -->
  <rect x="560" y="185" width="100" height="160" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <rect x="560" y="215" width="55" height="100" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Right penalty box -->
  <rect x="1040" y="185" width="100" height="160" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <rect x="1085" y="215" width="55" height="100" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Goals -->
  <rect x="556" y="235" width="14" height="60" fill="none" stroke="white" stroke-width="2"/>
  <rect x="1130" y="235" width="14" height="60" fill="none" stroke="white" stroke-width="2"/>
</svg>
