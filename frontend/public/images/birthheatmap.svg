<svg viewBox="0 0 1200 525" xmlns="http://www.w3.org/2000/svg" width="1200" height="525">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="525" fill="url(#bg)"/>

  <!-- Left Side Title & Info -->
  <g transform="translate(80, 140)">
    <!-- Main Title -->
    <text x="0" y="60" font-family="Segoe UI, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="1">Live Birth Counter</text>
    <!-- Subtitle -->
    <text x="3" y="110" font-family="Segoe UI, sans-serif" font-size="26" font-weight="500" fill="#FFA500" letter-spacing="1.5">INDIA STATS &amp; HEATMAP</text>
    <!-- Description -->
    <text x="3" y="150" font-family="Segoe UI, sans-serif" font-size="20" fill="#8c9cb2">Watch simulated live birth events across states in real-time</text>
  </g>

  <!-- Right Side Visuals (Stylized India map silhouette / heat points) -->
  <g transform="translate(820, 240)">
    <!-- Glow behind the visual -->
    <circle cx="0" cy="0" r="140" fill="#FFD700" opacity="0.05" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="80" fill="#FFD700" opacity="0.08" filter="url(#glow)"/>

    <!-- Pulse circles simulating birth ripples -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.2">
      <animate attributeName="r" values="60;140" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#FFA500" stroke-width="1.5" opacity="0.2">
      <animate attributeName="r" values="30;100" dur="2s" begin="0.7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.7s" repeatCount="indefinite" />
    </circle>

    <!-- Baby Crib / Bassinet Symbol -->
    <g transform="translate(-50, -50) scale(3.5)" stroke="url(#gold)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Bassinet Hood -->
      <path d="M4 14 A 1 1 0 0 1 24 14" stroke-width="2"/>
      <!-- Bassinet Body -->
      <path d="M4 14 L 6 22 A 1 1 0 0 0 22 22 L 24 14 Z" fill="url(#gold)" fill-opacity="0.1" stroke-width="2"/>
      <!-- Wheels -->
      <circle cx="9" cy="25" r="2" fill="#0b0f1a" stroke-width="2"/>
      <circle cx="19" cy="25" r="2" fill="#0b0f1a" stroke-width="2"/>
      <!-- Sparks/Stars -->
      <path d="M14 6 L14 10 M12 8 L16 8" stroke="#ffffff" stroke-width="1"/>
    </g>
  </g>

  <!-- Tiny status badge top-right -->
  <g transform="translate(1000, 50)">
    <circle cx="0" cy="0" r="6" fill="#00FF66">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="16" y="5" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#00FF66" letter-spacing="1">LIVE</text>
  </g>
</svg>
