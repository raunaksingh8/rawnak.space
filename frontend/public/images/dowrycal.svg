  <!-- Title -->
  <text x="40" y="100" font-family="Arial" font-size="44" font-weight="700" fill="#ffffff">
    Dowry Calculator
  </text>

  <!-- Updated Subtitle -->
  <text x="40" y="140" font-family="Arial" font-size="16" fill="#fdf2f8">
    calculate yours
  </text>

  <!-- Calculator -->
  <g transform="translate(520,70)">
    <rect width="170" height="160" rx="18" fill="#ffffff" opacity="0.95"></rect>

    <rect x="15" y="15" width="140" height="35" rx="6" fill="#111827"></rect>
    <text x="25" y="40" font-size="16" fill="#22c55e">₹ ???</text>

    <g fill="#e5e7eb">
      <rect x="15" y="60" width="40" height="28" rx="6"></rect>
      <rect x="65" y="60" width="40" height="28" rx="6"></rect>
      <rect x="115" y="60" width="40" height="28" rx="6"></rect>

      <rect x="15" y="98" width="40" height="28" rx="6"></rect>
      <rect x="65" y="98" width="40" height="28" rx="6"></rect>
      <rect x="115" y="98" width="40" height="28" rx="6"></rect>

      <rect x="15" y="136" width="140" height="28" rx="6"></rect>
    </g>
