<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgd3" x1="0" y1="0" x2="800" y2="300">
      <stop offset="0%" stop-color="#7c3aed"></stop>
      <stop offset="50%" stop-color="#ec4899"></stop>
      <stop offset="100%" stop-color="#f59e0b"></stop>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#ffffff30"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>
  </defs>

  <rect width="800" height="300" rx="20" fill="url(#bgd3)"></rect>

  <circle cx="120" cy="60" r="120" fill="url(#glow)"></circle>
  <circle cx="720" cy="260" r="140" fill="url(#glow)"></circle>

  <!-- Lights -->
  <path d="M0 40 Q200 80 400 40 Q600 0 800 40" fill="none" stroke="#ffffff80" stroke-width="2"></path>

  <g fill="#fde68a">
    <circle cx="100" cy="55" r="4"></circle>
    <circle cx="200" cy="65" r="4"></circle>
    <circle cx="300" cy="55" r="4"></circle>
    <circle cx="400" cy="45" r="4"></circle>
    <circle cx="500" cy="35" r="4"></circle>
    <circle cx="600" cy="45" r="4"></circle>
    <circle cx="700" cy="55" r="4"></circle>
  </g>

  <!-- Corner decor -->
  <g>
    <circle cx="20" cy="20" r="6" fill="#facc15"></circle>
    <circle cx="40" cy="25" r="6" fill="#fb923c"></circle>
    <circle cx="25" cy="40" r="6" fill="#facc15"></circle>

    <circle cx="780" cy="20" r="6" fill="#facc15"></circle>
    <circle cx="760" cy="25" r="6" fill="#fb923c"></circle>
