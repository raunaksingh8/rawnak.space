<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="300" rx="20" fill="#f2f2f2"></rect>

  <!-- Left progress bars -->
  <rect x="40" y="40" width="200" height="18" rx="9" fill="#34c759"></rect>
  <rect x="40" y="70" width="140" height="18" rx="9" fill="#34c759" opacity="0.6"></rect>
  <rect x="40" y="100" width="260" height="18" rx="9" fill="#34c759"></rect>
  <rect x="40" y="130" width="180" height="18" rx="9" fill="#34c759" opacity="0.7"></rect>

  <!-- Title -->
  <text x="320" y="130" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#111">
    Progress
  </text>

  <!-- Bottom progress -->
  <rect x="40" y="220" width="500" height="18" rx="9" fill="#34c759"></rect>

  <!-- Bar graph (right side) -->
  <g>
    <!-- Bars -->
    <rect x="620" y="170" width="20" height="70" fill="#34c759"></rect>
    <rect x="650" y="150" width="20" height="90" fill="#34c759" opacity="0.8"></rect>
    <rect x="680" y="120" width="20" height="120" fill="#34c759"></rect>
    <rect x="710" y="180" width="20" height="60" fill="#34c759" opacity="0.6"></rect>

    <!-- Base line -->
    <line x1="610" y1="240" x2="750" y2="240" stroke="#999" stroke-width="2"></line>
  </g>
</svg>