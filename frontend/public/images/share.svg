<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="300" rx="20" fill="#ffffff"></rect>

  <!-- Funky shapes -->
  <circle cx="100" cy="60" r="50" fill="#f472b6" opacity="0.8"></circle>
  <circle cx="700" cy="240" r="60" fill="#60a5fa" opacity="0.8"></circle>
  <rect x="650" y="40" width="80" height="80" rx="20" fill="#34d399" opacity="0.7" transform="rotate(20 650 40)"></rect>

  <!-- Zig-zag -->
  <polyline points="0,250 80,230 160,260 240,220 320,250 400,230" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"></polyline>

  <!-- Title -->
  <text x="40" y="110" font-family="Arial" font-size="48" font-weight="800" fill="#111">
    Share This Page
  </text>

  <!-- Subtitle -->
  <text x="40" y="150" font-family="Arial" font-size="18" fill="#6b7280">
    go on... make it viral 🚀
  </text>

  <!-- Funky arrow -->
  <g transform="translate(520,110)">
    <path d="M0 40 Q40 0 80 40 T160 40" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"></path>
    <polygon points="150,30 180,40 150,50" fill="#111"></polygon>
  </g>

  <!-- Dots -->
  <g fill="#111">
    <circle cx="600" cy="70" r="4"></circle>
    <circle cx="620" cy="90" r="4"></circle>
    <circle cx="640" cy="70" r="4"></circle>
  </g>

</svg>