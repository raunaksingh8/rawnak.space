<svg viewBox="0 0 1200 525" xmlns="http://www.w3.org/2000/svg" width="1200" height="525">
  <rect width="1200" height="525" fill="#ffffff"/>

  <!-- Decorative shapes right side -->
  <circle cx="950" cy="120" r="90" fill="#f472b6" opacity="0.85"/>
  <rect x="1020" y="200" width="120" height="120" rx="22" fill="#34d399" opacity="0.85"/>
  <circle cx="1100" cy="400" r="75" fill="#60a5fa" opacity="0.85"/>

  <!-- Decorative curve + arrow -->
  <path d="M 700 300 Q 820 200 900 320" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <polygon points="895,310 920,330 900,350" fill="#1a1a1a"/>

  <!-- Dot accents -->
  <circle cx="780" cy="200" r="7" fill="#1a1a1a"/>
  <circle cx="810" cy="180" r="5" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="840" cy="165" r="4" fill="#1a1a1a" opacity="0.3"/>

  <!-- Title -->
  <text x="60" y="200" font-family="Segoe UI, sans-serif" font-size="80" font-weight="700" fill="#1a1a1a">Share This Page</text>
  <text x="62" y="255" font-family="Segoe UI, sans-serif" font-size="28" fill="#666">go on... make it viral 📣</text>

  <!-- Bottom line graph -->
  <polyline points="60,420 200,400 340,415 480,385 560,395 650,370"
    fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Share icons row -->
  <circle cx="80" cy="480" r="22" fill="#1877f2"/>
  <text x="80" y="488" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">f</text>

  <circle cx="140" cy="480" r="22" fill="#1da1f2"/>
  <text x="140" y="488" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">t</text>

  <circle cx="200" cy="480" r="22" fill="#25d366"/>
  <text x="200" y="489" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">W</text>

  <circle cx="260" cy="480" r="22" fill="#0077b5"/>
  <text x="260" y="489" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">in</text>
</svg>
