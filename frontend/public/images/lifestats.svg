<svg viewBox="0 0 1200 525" xmlns="http://www.w3.org/2000/svg" width="1200" height="525">
  <rect width="1200" height="525" fill="#0f1923"/>

  <!-- Title -->
  <text x="60" y="100" font-family="Segoe UI, sans-serif" font-size="60" font-weight="700" fill="#ffffff">Life Stats</text>
  <text x="62" y="140" font-family="Segoe UI, sans-serif" font-size="22" fill="#888">because everything can be measured :)</text>

  <!-- Heartbeat line -->
  <polyline points="700,80 760,80 790,40 820,120 850,80 920,80 940,60 960,100 980,80 1140,80"
    fill="none" stroke="#e05c5c" stroke-width="3"/>

  <!-- Circular progress -->
  <circle cx="220" cy="320" r="110" fill="none" stroke="#1e2d3d" stroke-width="18"/>
  <circle cx="220" cy="320" r="110" fill="none" stroke="#4CAF50" stroke-width="18"
    stroke-dasharray="415" stroke-dashoffset="166" stroke-linecap="round"
    transform="rotate(-90 220 320)"/>
  <text x="220" y="310" font-family="Segoe UI, sans-serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle">58%</text>
  <text x="220" y="352" font-family="Segoe UI, sans-serif" font-size="20" fill="#aaa" text-anchor="middle">overall</text>

  <!-- Stats bars -->
  <text x="420" y="255" font-family="Segoe UI, sans-serif" font-size="24" fill="#aaa">Sleep</text>
  <rect x="530" y="235" width="520" height="16" rx="8" fill="#1e2d3d"/>
  <rect x="530" y="235" width="340" height="16" rx="8" fill="#5b8af5"/>

  <text x="420" y="315" font-family="Segoe UI, sans-serif" font-size="24" fill="#aaa">Work</text>
  <rect x="530" y="295" width="520" height="16" rx="8" fill="#1e2d3d"/>
  <rect x="530" y="295" width="460" height="16" rx="8" fill="#4CAF50"/>

  <text x="420" y="375" font-family="Segoe UI, sans-serif" font-size="24" fill="#aaa">Fun</text>
  <rect x="530" y="355" width="520" height="16" rx="8" fill="#1e2d3d"/>
  <rect x="530" y="355" width="200" height="16" rx="8" fill="#f5a623"/>

  <text x="420" y="435" font-family="Segoe UI, sans-serif" font-size="24" fill="#aaa">Social</text>
  <rect x="530" y="415" width="520" height="16" rx="8" fill="#1e2d3d"/>
  <rect x="530" y="415" width="300" height="16" rx="8" fill="#c471ed"/>
</svg>
