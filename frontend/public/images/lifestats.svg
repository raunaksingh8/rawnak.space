<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#1e293b"></stop>
    </linearGradient>

    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"></stop>
      <stop offset="100%" stop-color="#818cf8"></stop>
    </linearGradient>

    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"></stop>
      <stop offset="100%" stop-color="#34d399"></stop>
    </linearGradient>

    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"></stop>
      <stop offset="100%" stop-color="#fbbf24"></stop>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="5" y="5" width="790" height="290" rx="20" fill="url(#bg)" stroke="#334155" stroke-width="2"></rect>

  <!-- Title -->
  <text x="40" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#f1f5f9">
    Life Stats
  </text>

  <!-- Updated Subtitle -->
  <text x="40" y="105" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">
    because everything can be measured :)
  </text>

  <!-- Circular stat -->
  <circle cx="140" cy="180" r="60" stroke="#334155" stroke-width="12" fill="none"></circle>
  <circle cx="140" cy="180" r="60" stroke="#22c55e" stroke-width="12" fill="none" stroke-dasharray="377" stroke-dashoffset="160" stroke-linecap="round" transform="rotate(-90 140 180)"></circle>

  <!-- % -->
  <text x="120" y="185" font-family="Arial" font-size="22" font-weight="700" fill="#f8fafc">
    58%
  </text>

  <!-- Bars -->
  <g>
    <text x="300" y="140" font-size="14" fill="#94a3b8">Sleep</text>
    <text x="300" y="180" font-size="14" fill="#94a3b8">Work</text>
    <text x="300" y="220" font-size="14" fill="#94a3b8">Fun</text>

    <rect x="360" y="130" width="300" height="12" rx="6" fill="#1e293b"></rect>
    <rect x="360" y="170" width="300" height="12" rx="6" fill="#1e293b"></rect>
    <rect x="360" y="210" width="300" height="12" rx="6" fill="#1e293b"></rect>

    <rect x="360" y="130" width="160" height="12" rx="6" fill="url(#bar1)"></rect>
    <rect x="360" y="170" width="220" height="12" rx="6" fill="url(#bar2)"></rect>
    <rect x="360" y="210" width="120" height="12" rx="6" fill="url(#bar3)"></rect>
  </g>

  <!-- Heartbeat line -->
  <polyline points="600,80 620,80 630,60 645,100 660,80 690,80" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round"></polyline>

</svg>